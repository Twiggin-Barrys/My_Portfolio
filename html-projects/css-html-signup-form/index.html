<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signup Form</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="auth-modal">
      <div class="close-icon">ⓧ</div>
      <h2>Sign Up</h2>
      <p>
        By signing up you agree to our term and conditions. Learn about our
        Privacy Policy before clicking submit.
      </p>
      <form action="">
        <input
          type="text"
          name="username"
          id="username"
          placeholder="username"
        />
        <input
          type="password"
          name="password"
          id="password"
          placeholder="password"
        />
        <input
          type="password"
          name="password-check"
          id="password-check"
          placeholder="confirm password"
        />
        <label for="tandc"
          ><input type="checkbox" name="tandc" id="tandc" required />I agree to
          the terms and conditions</label
        >

        <input type="submit" class="form-button" />
      </form>
      <hr />
      <h2>dowload the app</h2>
      <div class="link-container">
        <a href="https://play.google.com/store">
          <img
            src="images/4PyF-google-play-download.png"
            alt="google play icon"
          />
        </a>
        <a href="https://www.apple.com/store">
          <img
            src="images/XOki-app-store-download.png"
            alt="apple store icon"
          />
        </a>
      </div>
    </div>
  </body>
</html>
