<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Photo Carousel</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="carousel-container">
      <div class="photo-container">
        <img
          id="photo-1"
          src="images/pexels-davidriano-975771.jpg"
          alt="Jungle Pool"
        />
        <img
          id="photo-2"
          src="images/pexels-darshan394-2695412.jpg"
          alt="Jungle River"
        />
        <img
          id="photo-3"
          src="images/pexels-balazsimon-6873614.jpg"
          alt="Jungle top mist"
        />
      </div>
      <div class="button-container">
        <a class="button" href="#photo-1"></a>
        <a class="button" href="#photo-2"></a>
        <a class="button" href="#photo-3"></a>
      </div>
    </div>
  </body>
</html>
