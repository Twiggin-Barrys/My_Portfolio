<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Radio Inputs</title>
    <link rel="stylesheet" href=".../css/styles.css" />
  </head>
  <body>
    <form action="">
      <legend><strong>How was your time at happyland?</strong></legend>
      <br />
      <input type="radio" id="bad" name="happyland-experience" value="bad" />
      <label for="bad">Bad</label>
      <input
        type="radio"
        id="okay"
        name="happyland-experience"
        value="okay"
        checked
      />
      <label for="okay">Okay</label>
      <input type="radio" id="good" name="happyland-experience" value="good" />
      <label for="good">Good</label>
      <input type="submit" />
    </form>
  </body>
</html>
